<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | AquaCraft Pools</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0B3247;--aqua:#1FC8C2;--sand:#F7F2E7;}
  body{font-family:'Inter',sans-serif;background:var(--sand);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card-box{background:#fff;border-radius:16px;padding:40px;box-shadow:0 18px 40px rgba(7,36,51,.16);max-width:400px;width:100%;}
  .brand{font-family:'Archivo Black';font-size:1.4rem;color:var(--navy);margin-bottom:6px;}
  .brand span{color:var(--aqua);}
  .sub{color:#5C7282;font-size:.9rem;margin-bottom:24px;}
  .btn-navy{background:var(--navy);color:#fff;font-weight:700;}
  .btn-navy:hover{background:#072433;color:#fff;}
</style>
</head>
<body>
<div class="card-box">
  <div class="brand">Aqua<span>Craft</span> Admin</div>
  <p class="sub">Sign in to manage products, gallery, reviews & orders.</p>
  {% if form.errors %}
    <div class="alert alert-danger py-2">Incorrect username or password.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-bold">Username</label>
      <input type="text" name="username" class="form-control" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label fw-bold">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn btn-navy w-100">Log In</button>
  </form>
</div>
</body>
</html>
